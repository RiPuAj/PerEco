{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mi App{% endblock %}</title>

  <script>
    if (localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9f4', 100: '#dcf1e3', 500: '#1f8a5f',
              600: '#197349', 700: '#145c3a',
            },
          },
          fontFamily: {
            sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'core/css/custom.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-stone-50 text-stone-800 dark:bg-stone-900 dark:text-stone-200 font-sans antialiased">

  {% include 'base/navbar.html' %}

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
          <div class="rounded-lg border px-4 py-3 text-sm
                      {% if message.tags == 'error' %} bg-red-50 border-red-200 text-red-700 dark:bg-red-900/30 dark:border-red-800 dark:text-red-400
                      {% elif message.tags == 'success' %} bg-brand-50 border-brand-100 text-brand-700 dark:bg-brand-900/30 dark:border-brand-800 dark:text-brand-400
                      {% else %} bg-stone-100 border-stone-200 text-stone-700 dark:bg-stone-800 dark:border-stone-700 dark:text-stone-300 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
