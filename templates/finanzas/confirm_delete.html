{% extends 'base/base.html' %}
{% block title %}Confirmar eliminación{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto text-center">
    <h1 class="text-2xl font-semibold text-stone-900 dark:text-stone-100 mb-2">¿Eliminar este elemento?</h1>
    <p class="text-stone-500 dark:text-stone-400 mb-6">Esta acción no se puede deshacer.</p>

    <form method="post" class="rounded-2xl border border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800 p-6">
      {% csrf_token %}
      <p class="text-stone-700 dark:text-stone-300 mb-6">{{ object }}</p>
      <div class="flex items-center justify-center gap-3">
        <button type="submit" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">Eliminar</button>
        <a href="{{ cancel_url }}" class="rounded-lg border border-stone-300 dark:border-stone-600 px-4 py-2 text-sm font-medium text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
