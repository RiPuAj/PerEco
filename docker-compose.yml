version: "3.8"

services:
  web:
    build: .
    container_name: bodylog
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-cambiar-esta-clave-en-produccion}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
    volumes:
      - data:/app/data
      - static_data:/app/staticfiles

volumes:
  data:
  static_data:
